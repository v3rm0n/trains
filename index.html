<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Vaata Elroni rongi, Tartu linna bussi ja parvlaeva sõiduplaane. Leia väljumis- ja saabumisajad liinidel.">
    <meta name="keywords" content="Elron, rong, buss, praam, sõiduplaan, Eesti, Tallinn, Tartu, Saaremaa, Hiiumaa, raudtee, ühistransport, parvlaev">
    <meta name="author" content="Sõiduplaan">
    
    <!-- Theme Color for Mobile Browsers -->
    <meta name="theme-color" content="#0d1117">
    
    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Rongi, Bussi ja Praami Sõiduplaan">
    <meta property="og:description" content="Vaata Elroni rongi, Tartu bussi ja parvlaeva sõiduplaane">
    <meta property="og:locale" content="et_EE">
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Rongi, Bussi ja Praami Sõiduplaan">
    <meta name="twitter:description" content="Vaata Elroni rongi, Tartu bussi ja parvlaeva sõiduplaane">
    
    <title>Rongi, Bussi ja Praami Sõiduplaan</title>
    
    <!-- Preconnect to External Resources -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://api.ridango.com">
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="styles.css">
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚂</text></svg>">
</head>
<body>
    <button type="button" class="theme-toggle" id="themeToggle" aria-label="Vaheta teema" title="Vaheta hele/tume teema">
        <span class="theme-icon" id="themeIcon">🌙</span>
    </button>
    
    <main class="container">
        <h1 class="sr-only">Sõiduplaan</h1>
        
        <!-- Transport Mode Toggle -->
        <div class="mode-toggle">
            <button type="button" class="mode-btn active" id="modeTrain" aria-label="Rongid">
                <span class="mode-icon">🚂</span>
                <span>Rongid</span>
            </button>
            <button type="button" class="mode-btn" id="modeBus" aria-label="Tartu Bussid">
                <span class="mode-icon">🚌</span>
                <span>Tartu Bussid</span>
            </button>
            <button type="button" class="mode-btn" id="modeFerry" aria-label="Praamid">
                <span class="mode-icon">⛴️</span>
                <span>Praamid</span>
            </button>
        </div>
        
        <form class="input-row" id="searchForm">
            <div class="field">
                <label for="fromStation">Kust</label>
                <div class="autocomplete-wrapper">
                    <input 
                        type="text" 
                        id="fromStation" 
                        name="from"
                        placeholder="Sisesta jaam..." 
                        autocomplete="off"
                        aria-label="Väljumisjaam"
                        aria-autocomplete="list"
                        aria-controls="fromAutocomplete"
                        aria-expanded="false"
                    >
                    <div 
                        id="fromAutocomplete" 
                        class="autocomplete-list"
                        role="listbox"
                        aria-label="Väljumisjaamad"
                    ></div>
                </div>
            </div>
            
            <div class="field field-swap">
                <label for="swapBtn">Vaheta</label>
                <button 
                    type="button"
                    id="swapBtn" 
                    class="swap-btn" 
                    title="Vaheta väljumis- ja sihtjaam"
                    aria-label="Vaheta jaamad"
                >⇄</button>
            </div>
            
            <div class="field">
                <label for="toStation">Kuhu</label>
                <div class="autocomplete-wrapper">
                    <input 
                        type="text" 
                        id="toStation" 
                        name="to"
                        placeholder="Sisesta jaam..." 
                        autocomplete="off"
                        aria-label="Sihtjaam"
                        aria-autocomplete="list"
                        aria-controls="toAutocomplete"
                        aria-expanded="false"
                    >
                    <div 
                        id="toAutocomplete" 
                        class="autocomplete-list"
                        role="listbox"
                        aria-label="Sihtjaamad"
                    ></div>
                </div>
            </div>
            
            <div class="field field-small">
                <label for="datePicker">Kuupäev</label>
                <input 
                    type="date" 
                    id="datePicker"
                    name="date"
                    aria-label="Reisi kuupäev"
                >
            </div>
            
            <div class="field field-button">
                <label for="searchBtn">Otsi</label>
                <button 
                    type="submit"
                    id="searchBtn"
                    aria-label="Otsi ronge"
                >Otsi</button>
            </div>
        </form>

        <section class="recent-searches" id="recentSearches" style="display: none;" aria-label="Hiljutised otsingud">
            <label>Hiljutised</label>
            <div class="recent-list" id="recentList" role="list"></div>
        </section>

        <div class="filter-row">
            <label class="checkbox-label">
                <input 
                    type="checkbox" 
                    id="showDeparted"
                    aria-label="Näita väljunud ronge"
                >
                <span>Näita väljunud ronge</span>
            </label>
        </div>

        <div 
            class="error" 
            id="error" 
            style="display: none;"
            role="alert"
            aria-live="polite"
        >
            <span id="errorText"></span>
        </div>

        <div 
            class="loading" 
            id="loading" 
            style="display: none;"
            role="status"
            aria-live="polite"
        >
            Laadin sõiduplaane...
        </div>

        <section 
            class="results" 
            id="results" 
            style="display: none;"
            aria-label="Sõiduplaanide tulemused"
        >
            <div class="route" id="routeDisplay">
                <span id="fromDisplay"></span> → <span id="toDisplay"></span>
                <span class="route-date" id="routeDate"></span>
            </div>
            
            <table class="timetable" role="table" aria-label="Sõiduplaan">
                <thead>
                    <tr role="row">
                        <th scope="col" role="columnheader">Liin</th>
                        <th scope="col" role="columnheader">Väljumine</th>
                        <th scope="col" role="columnheader">Saabumine</th>
                        <th scope="col" role="columnheader">Kestus</th>
                    </tr>
                </thead>
                <tbody id="resultsBody" role="rowgroup"></tbody>
            </table>
            
            <div class="legend" aria-label="Legend">
                <span>* tulevad</span><span>~ väljunud</span>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
